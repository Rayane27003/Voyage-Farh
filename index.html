<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Voyages Farah</title>

<link rel="stylesheet" href="style.css">

</head>

<body>


<header>

<div class="logo">
<img src="logo.png" alt="Voyages Farah">
</div>

<nav>

<ul>
<li><a href="#">الرئيسية</a></li>
<li><a href="#">الأسعار</a></li>
<li><a href="#">الحجز</a></li>
<li><a href="#">اتصل بنا</a></li>
</ul>

</nav>

</header>



<section class="hero">

<img src="bus.png" alt="Bus">

<div class="hero-text">

<h1>Voyages Farah</h1>

<p>
سافر براحة، أمان، واحترام للمواعيد
</p>

<a class="btn" href="#">
احجز الآن
</a>

</div>

</section>




<!-- بطاقة الرحلة الاحترافية -->

<section class="trip-card">


<div class="company-name">
Voyages Farah
</div>


<h2>
الدار البيضاء ➜ مراكش ➜ ورزازات ➜ زاكورة
</h2>


<div class="line"></div>


<div class="trip-info">


<div>
<span>🕖</span>
<p>الانطلاق</p>
<strong>07:00 مساءً</strong>
</div>


<div>
<span>🕥</span>
<p>الوصول</p>
<strong>10:30 مساءً</strong>
</div>


</div>



<div class="features">

<span>❄️ مكيف هوائي</span>

<span>💺 مقاعد مريحة</span>

<span>🧳 مكان للأمتعة</span>

</div>


</section>





<section class="buttons">


<button onclick="showInfo('prices')">
💰 الأسعار
</button>


<button onclick="showInfo('booking')">
🎫 الحجز
</button>


<button onclick="showInfo('contact')">
📞 اتصل بنا
</button>


</section>




<div id="infoBox" class="info-box"></div>





<footer>

<p>
© 2026 Voyages Farah - جميع الحقوق محفوظة
</p>

</footer>





<script>


function showInfo(type){

let box=document.getElementById("infoBox");


if(type==="prices"){

box.innerHTML=
`
<h3>الأسعار</h3>
<p>سيتم عرض أسعار الرحلات هنا</p>
`;

}



if(type==="booking"){

box.innerHTML=
`
<h3>الحجز</h3>
<p>لحجز مكانكم المرجو التواصل معنا</p>
`;

}



if(type==="contact"){

box.innerHTML=
`
<h3>اتصل بنا</h3>
<p>اختار طريقة التواصل</p>
`;

}


box.style.display="block";

}


</script>



</body>

</html>
